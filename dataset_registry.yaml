version: 1
notes: >
  Dataset registry containing Pyserini index names, topic/qrels references,
  and BM25 weighting configurations for reproducible retrieval experiments.
  This file is specifically designed for Pyserini prebuilt indices and topics.
  Entries cover the datasets evaluated in published results; add new entries
  here when extending coverage.

datasets:

################### MSMARCO Datasets ########################

  msmarco-v1-passage.trecdl2019:
    name: "TREC Deep Learning 2019 — Passage"
    index:
      name: "msmarco-v1-passage"
    topics:
      name: "dl19-passage"
    qrels:
      name: "dl19-passage"
    bm25_weights:
      k1: 0.9
      b: 0.4
    output:
      runfile_template: "run.msmarco-v1-passage.bm25-default.dl19.txt"
      eval_metrics: ["map", "ndcg_cut.10", "recall.1000"]

  msmarco-v1-passage.trecdl2020:
    name: "TREC Deep Learning 2020 — Passage"
    index:
      name: "msmarco-v1-passage"
    topics:
      name: "dl20-passage"
    qrels:
      name: "dl20-passage"
    bm25_weights:
      k1: 0.9
      b: 0.4
    output:
      runfile_template: "run.msmarco-v1-passage.bm25-default.dl20.txt"
      eval_metrics: ["map", "ndcg_cut.10", "recall.1000"]

  msmarco-v1-passage.dlhard:
    name: "DL-HARD — MS MARCO v1 Passage (hard subset)"
    index:
      name: "msmarco-v1-passage"
    topics:
      name: "dl-hard"
    qrels:
      name: "dl-hard"
    bm25_weights:
      k1: 0.9
      b: 0.4
    output:
      runfile_template: "run.msmarco-v1-passage.bm25-default.dlhard.txt"
      eval_metrics: ["ndcg_cut.10", "recall.1000"]

